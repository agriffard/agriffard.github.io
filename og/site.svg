<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#fefbfb"/>
  <!-- Shadow card -->
  <rect x="78" y="68" width="1044" height="494" rx="4" fill="#ecebeb"/>
  <!-- Main card -->
  <rect x="70" y="60" width="1044" height="494" rx="4" fill="#fefbfb" stroke="#1a1a2e" stroke-width="4"/>
  <!-- Accent bar -->
  <rect x="70" y="60" width="1044" height="8" rx="4" fill="#0d6efd"/>
  <!-- Title -->
  <text x="600" y="270" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="700" fill="#1a1a2e" text-anchor="middle">Antoine Griffard</text>
  <!-- Description -->
  <text x="600" y="340" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" fill="#6c757d" text-anchor="middle">Have you tried turning it off and on again?</text>
  <!-- URL -->
  <text x="1064" y="510" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="700" fill="#6c757d" text-anchor="end">antoinegriffard.com</text>
