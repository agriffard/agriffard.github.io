<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blarkdown</title>
  <!-- PatchBaseHref replaces "/" with the repo subpath at publish time -->
  <base href="/agriffard.github.io/" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="css/app.css" />
  <link rel="stylesheet" href="css/prism-one-dark.css" />

  <!-- OG meta — patched by ManifestGenerator at build time -->
  <meta property="og:title" content="Antoine Griffard" />
  <meta property="og:description" content="Have you tried turning it off and on again?" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://agriffard.github.io/agriffard.github.io" />
  <meta property="og:image" content="https://agriffard.github.io/agriffard.github.io/og/site.svg" />
  <meta property="og:locale" content="fr_FR" />
  <meta property="og:site_name" content="Antoine Griffard" />
  <meta name="description" content="Have you tried turning it off and on again?" />
</head>
<body>
  <div id="app"><div class="loading">Chargement…</div></div>
  <script>
    (function () {
      var redirect = sessionStorage.getItem('spa-redirect');
      if (redirect) {
        sessionStorage.removeItem('spa-redirect');
        history.replaceState(null, '', redirect);
      }
    })();
  </script>
  <script src="_framework/blazor.webassembly.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.30.0/prism.min.js" data-manual></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.30.0/plugins/autoloader/prism-autoloader.min.js"></script>
  <script src="js/code-copy.js"></script>
</body>
</html>
