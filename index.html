<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blarkdown</title>
  <!-- PatchBaseHref replaces "/" with the repo subpath at publish time -->
  <base href="/" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="css/app.css" />

  <!-- Prism theme: defer loading — only needed for post pages with code blocks -->
  <link rel="stylesheet" href="css/prism-one-dark.css" media="print" onload="this.media='all'" />
  <noscript><link rel="stylesheet" href="css/prism-one-dark.css" /></noscript>

  <!-- Preconnect to CDN for Prism -->
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
  <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com" />

  <!-- OG meta — patched by ManifestGenerator at build time -->
  <meta property="og:title" content="Antoine Griffard" />
  <meta property="og:description" content="Have you tried turning it off and on again?" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://antoinegriffard.com" />
  <meta property="og:image" content="https://antoinegriffard.com/og/site.svg" />
  <meta property="og:locale" content="fr_FR" />
  <meta property="og:site_name" content="Antoine Griffard" />
  <meta name="description" content="Have you tried turning it off and on again?" />
</head>
<body>
  <div id="app">
    <div class="splash">
      <svg class="splash-spinner" viewBox="0 0 50 50" width="48" height="48">
        <circle cx="25" cy="25" r="20" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-dasharray="90 150" stroke-dashoffset="0">
          <animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="0.8s" repeatCount="indefinite"/>
        </circle>
      </svg>
      <p>Chargement&hellip;</p>
    </div>
  </div>
  <script>
    (function () {
      var redirect = sessionStorage.getItem('spa-redirect');
      if (redirect) {
        sessionStorage.removeItem('spa-redirect');
        history.replaceState(null, '', redirect);
      }
    })();
  </script>
  <script src="_framework/blazor.webassembly.js" autostart="false"></script>
  <script>
    // Start Blazor first, then lazy-load Prism after WASM is interactive
    Blazor.start().then(function () {
      var s1 = document.createElement('script');
      s1.src = 'https://cdnjs.cloudflare.com/ajax/libs/prism/1.30.0/prism.min.js';
      s1.setAttribute('data-manual', '');
      s1.onload = function () {
        var s2 = document.createElement('script');
        s2.src = 'https://cdnjs.cloudflare.com/ajax/libs/prism/1.30.0/plugins/autoloader/prism-autoloader.min.js';
        s2.onload = function () {
          var s3 = document.createElement('script');
          s3.src = 'js/code-copy.js';
          document.body.appendChild(s3);
        };
        document.body.appendChild(s2);
      };
      document.body.appendChild(s1);
    });
  </script>
</body>
</html>
