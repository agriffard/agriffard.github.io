name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore Blog.slnx

      # MSBuild déclenche GenerateContentManifest (BeforeTargets="BeforeBuild")
      # puis PatchBaseHref (AfterTargets="Publish")
      - name: Publish
        run: |
          dotnet publish src/Blog.Wasm/Blog.Wasm.csproj \
            --configuration Release \
            --output publish \
            /p:SiteBaseUrl=https://antoinegriffard.com

      - name: Fix SPA routing
        run: cp publish/wwwroot/index.html publish/wwwroot/404.html

      - name: Verify manifest.json
        run: |
          [ -f publish/wwwroot/data/manifest.json ] || { echo "::error::manifest.json absent"; exit 1; }
          echo "manifest.json OK — $(jq '.posts | length' publish/wwwroot/data/manifest.json) articles"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: publish/wwwroot
          force_orphan: false
          commit_message: "deploy: ${{ github.sha }} — ${{ github.event.head_commit.message }}"
